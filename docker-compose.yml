version: '3.8'

services:
  app:
    build: .
    container_name: levelup_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_PATH=/mnt/storage/levelup.db
      - QUEUE_PATH=/mnt/storage/queue
      - UPLOADS_DIR=/app/uploads
      - OLLAMA_URL=http://ollama:11434
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      - ollama
    volumes:
      - ./uploads:/app/uploads
      - /mnt/storage:/mnt/storage   # DB + queue live here

  ollama:
    image: ollama/ollama:latest
    container_name: levelup_ollama
    restart: always
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_QUEUE=5
    mem_limit: 4g
    volumes:
      - /mnt/storage/ollama:/root/.ollama
    expose:
      - "11434"
