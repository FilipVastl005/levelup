<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - LevelUp</title>
    <link rel="stylesheet" href="/levelup/static/css/style.css">
</head>
<body>
    <div class="auth-container">
        <h1>LevelUp Admin</h1>
        <form method="post">
            {% if error %}<p class="error">{{ error }}</p>{% endif %}
            <label>Admin Heslo:</label>
            <input type="password" name="password" required>
            <button type="submit">Vstoupit</button>
        </form>
    </div>
</body>
</html>
